services:
  # -----------------------------------------------
  # PHP Application (Laravel)
  # -----------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: note-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - note-app-network
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-note_app}
      - DB_USERNAME=${DB_USERNAME:-note_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}

  # -----------------------------------------------
  # Nginx Web Server
  # -----------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: note-app-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-8001}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - note-app-network
    depends_on:
      - app

  mysql:
    image: mariadb:11
    container_name: note-app-mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DB_EXTERNAL_PORT:-3307}:3306" # Đã sửa để bảo mật, chặn truy cập database trực tiếp từ ngoài internet
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-note_app}
      MARIADB_USER: ${DB_USERNAME:-note_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-secret}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - note-app-network
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  note-app-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
